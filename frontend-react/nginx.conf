server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    # When co-located behind ALB, prefer ALB routing to API.
    # For local docker-compose, set proxy upstream via compose override.
    return 404;
  }
}
