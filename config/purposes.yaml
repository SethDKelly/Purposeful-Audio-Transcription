      ---

  meta_synthesis:
    name: "Meta-Synthesis"
    description: >
      Integrates multiple prior analysis outputs into a coherent formulation.
      Provide analysis outputs (not the raw transcript) as input.
    enabled: true
    ollama_model: null
    system_prompt_file: "13 Meta-Synthesis.md"
    user_prompt_template: |
      Synthesize the following analytical outputs according to your instructions.

      ---
      {transcript}
      ---
