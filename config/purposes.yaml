      ---

  bias_epistemic_quality:
    name: "Bias & Epistemic Quality"
    description: >
      Analysis of bias, reliability, assumptions, and epistemic quality in how
      participants interpret and argue within the conversation.
    enabled: true
    ollama_model: null
    system_prompt_file: "12 Bias & Epistemic Quality.md"
    user_prompt_template: |
