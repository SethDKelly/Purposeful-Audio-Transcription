id: full_mvp
name: "Full MVP"
version: "1.1.0"
enabled: true
description: "Comprehensive MVP workflow with explicit DAG waves and cross-module synthesis."
estimated_runtime: "3-8 min"
recommended_model: null
output_tone: integrative
# Linear modules retained for clients; steps drive DAG execution.
modules:
  - relationship_conversation_analysis
  - nvc_analysis
  - systems_analysis
  - bias_epistemic_quality
  - meta_synthesis
steps:
  - id: observable_wave
    parallel:
      - relationship_conversation_analysis
      - nvc_analysis
      - systems_analysis
      - bias_epistemic_quality
  - id: synthesis
    depends_on:
      - observable_wave
    module: meta_synthesis
meta_synthesis: true
