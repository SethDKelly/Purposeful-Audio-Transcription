# Pre-commit: Tier 1 (fast) + Tier 2 (targeted) gates for RRE.
# Install: pip install -e ".[dev]" && pre-commit install
# Run all: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        name: check-yaml (generic)
        exclude: ^(docs/|infra/.*\.tf\.vars\.example$)
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: trailing-whitespace
        exclude: ^(docs/|.*\.md$)
      - id: end-of-file-fixer
        exclude: ^(docs/)
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        # Lint only; ruff-format is manual until the tree is normalized.
        args: []
      - id: ruff-format
        stages: [manual]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        name: actionlint (GitHub Actions)

  - repo: local
    hooks:
      - id: validate-yaml-rre
        name: validate RRE YAML syntax
        entry: python scripts/run_venv.py scripts/validate_yaml.py
        language: system
        pass_filenames: false
        files: (\.ya?ml$)|(validate_yaml\.py$)

      - id: validate-config
        name: validate modules/workflows registries
        entry: python scripts/run_venv.py scripts/validate_config.py
        language: system
        pass_filenames: false
        files: ^(config/|backend/core/(module|workflow|ontology)_registry\.py|scripts/validate_config\.py)

      - id: terraform-fmt
        name: terraform fmt -check
        entry: python scripts/run_venv.py scripts/check_terraform_fmt.py
        language: system
        pass_filenames: false
        files: ^infra/

      - id: pytest-tier2
        name: pytest registries / parser / workflows (tier 2)
        entry: python scripts/run_venv.py -m pytest -q
          tests/test_module_registry.py
          tests/test_ontology_registry.py
          tests/test_workflow_registry.py
          tests/test_output_parser.py
          tests/test_module_output_validator.py
          tests/test_prompt_compiler.py
          tests/test_bedrock_provider.py
          tests/test_p1_4_workflows.py
          tests/test_validate_config.py
        language: system
        pass_filenames: false
        files: ^(backend/|config/|tests/|scripts/validate_)
