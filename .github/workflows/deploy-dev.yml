name: Deploy to AWS dev

# Deploy on demand for minor-version releases (e.g. v1.0.0), not every main push.
# Intra-minor work commits to main without waking AWS.
# Manual: Actions → Deploy to AWS dev → Run workflow (choose component).
on:
  workflow_dispatch:
    inputs:
      component:
        description: "Which ECS components to rebuild/redeploy"
        required: true
        default: all
        type: choice
        options:
          - all
          - api
          - ui
          - worker
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  AWS_ACCOUNT_ID: "521018312783"
  TF_WORKING_DIR: infra/dev
  IMAGE_TAG: ${{ github.sha }}
  # Tag pushes always deploy all; workflow_dispatch uses the input.
  DEPLOY_COMPONENT: ${{ github.event_name == 'workflow_dispatch' && inputs.component || 'all' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Validate config + YAML
        run: |
          python scripts/validate_yaml.py
          python scripts/validate_config.py

      - name: Guard against committed Python caches
        run: python scripts/check_no_pycache.py

      - name: Guard UI/API boundary
        run: python scripts/check_ui_api_boundary.py

      - name: Run tests
        run: python -m pytest tests/ -q

  deploy:
    name: Deploy (dev)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Debug GitHub OIDC claims (pre-assume)
        continue-on-error: true
        run: |
          set -euo pipefail
          TOKEN=$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" | jq -r .value)
          PAYLOAD_B64=$(echo "$TOKEN" | cut -d. -f2)
          python3 scripts/decode-oidc-claims.py "$PAYLOAD_B64"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::521018312783:role/dev-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Ensure RDS is available
        run: |
          set -euo pipefail
          ID="rre-dev-postgres"
          STATUS=$(aws rds describe-db-instances --db-instance-identifier "$ID" \
            --query 'DBInstances[0].DBInstanceStatus' --output text)
          echo "RDS $ID status: $STATUS"
          if [ "$STATUS" = "stopped" ]; then
            echo "Starting stopped RDS instance (required after pause workflow)..."
            aws rds start-db-instance --db-instance-identifier "$ID" --no-cli-pager
          fi
          echo "Waiting for RDS to become available..."
          aws rds wait db-instance-available --db-instance-identifier "$ID"

      - name: Ensure ECR repositories exist
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set -euo pipefail
          # Skip targeted apply when repos already exist — terraform -target fails
          # when other resources have pending address moves in state.
          if aws ecr describe-repositories --repository-names rre-dev-api rre-dev-ui >/dev/null 2>&1; then
            echo "ECR repositories already present; full terraform apply will manage them."
          else
            terraform apply -input=false -auto-approve \
              -target=aws_ecr_repository.api \
              -target=aws_ecr_repository.ui
          fi

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image (cloud slim)
        if: env.DEPLOY_COMPONENT == 'all' || env.DEPLOY_COMPONENT == 'api' || env.DEPLOY_COMPONENT == 'worker'
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t "$ECR_REGISTRY/rre-dev-api:${IMAGE_TAG}" -f Dockerfile.cloud .
          docker push "$ECR_REGISTRY/rre-dev-api:${IMAGE_TAG}"
          docker tag "$ECR_REGISTRY/rre-dev-api:${IMAGE_TAG}" "$ECR_REGISTRY/rre-dev-api:latest"
          docker push "$ECR_REGISTRY/rre-dev-api:latest"

      - name: Build and push UI image
        if: env.DEPLOY_COMPONENT == 'all' || env.DEPLOY_COMPONENT == 'ui'
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t "$ECR_REGISTRY/rre-dev-ui:${IMAGE_TAG}" -f Dockerfile.ui .
          docker push "$ECR_REGISTRY/rre-dev-ui:${IMAGE_TAG}"
          docker tag "$ECR_REGISTRY/rre-dev-ui:${IMAGE_TAG}" "$ECR_REGISTRY/rre-dev-ui:latest"
          docker push "$ECR_REGISTRY/rre-dev-ui:latest"

      # desired_count=1 + ALB: overlapping replace leaves old targets draining while new
      # tasks boot. Clear first so terraform brings up a single fresh revision.
      - name: Clear ECS tasks before apply
        env:
          ECS_CLEAR_MAX_ATTEMPTS: "40"
          ECS_CLEAR_SLEEP_SECS: "15"
          DEPLOY_COMPONENT: ${{ env.DEPLOY_COMPONENT }}
        run: |
          set -euo pipefail
          SERVICES=()
          case "$DEPLOY_COMPONENT" in
            all) SERVICES=(rre-dev-api rre-dev-ui rre-dev-worker) ;;
            api) SERVICES=(rre-dev-api) ;;
            ui) SERVICES=(rre-dev-ui) ;;
            worker) SERVICES=(rre-dev-worker) ;;
          esac
          python3 scripts/ecs-clear-before-deploy.py rre-dev-cluster "${SERVICES[@]}"

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve -var="image_tag=${IMAGE_TAG}"

      - name: Wait for ECS services stable
        env:
          ECS_WAIT_MAX_ATTEMPTS: "80"
          ECS_WAIT_SLEEP_SECS: "30"
          ECS_STEADY_POLLS: "3"
          DEPLOY_COMPONENT: ${{ env.DEPLOY_COMPONENT }}
        run: |
          set -euo pipefail
          SERVICES=()
          case "$DEPLOY_COMPONENT" in
            all) SERVICES=(rre-dev-api rre-dev-ui rre-dev-worker) ;;
            api) SERVICES=(rre-dev-api) ;;
            ui) SERVICES=(rre-dev-ui) ;;
            worker) SERVICES=(rre-dev-worker) ;;
          esac
          python3 scripts/wait-ecs-stable.py rre-dev-cluster "${SERVICES[@]}"

      - name: Smoke test (AWS-3f)
        env:
          TF_WORKING_DIR: ${{ env.TF_WORKING_DIR }}
          DEPLOY_COMPONENT: ${{ env.DEPLOY_COMPONENT }}
        run: |
          chmod +x scripts/aws-deploy-smoke.sh
          ./scripts/aws-deploy-smoke.sh

      - name: Deployment summary
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "## RRE dev deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Component: ${DEPLOY_COMPONENT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image tag: ${IMAGE_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $(terraform output -raw alb_url)" >> "$GITHUB_STEP_SUMMARY"
          echo "- API logs: $(terraform output -raw api_log_group)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker service: $(terraform output -raw ecs_worker_service_name)" >> "$GITHUB_STEP_SUMMARY"
          echo "- No-egress networking: $(terraform output -raw no_egress_networking_enabled)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Smoke: AWS-3f (health payload, workflows, UI, ECS, target groups, worker)" >> "$GITHUB_STEP_SUMMARY"
