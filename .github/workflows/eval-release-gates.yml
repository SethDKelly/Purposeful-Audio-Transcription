name: Eval release gates

# Fail releases when golden (offline) or safety red-team gates regress.
on:
  pull_request:
  push:
    branches: [main, "post-v1.0/**"]
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: OpenAPI v1 contract
        run: python -m pytest tests/test_v1_2_evaluation_api.py -q --tb=short
      - name: Golden offline (no live model)
        run: python -m pytest tests/ -m "golden and not live_model" -q --tb=short
      - name: Safety red-team
        run: python -m pytest tests/test_safety_red_team.py -q --tb=short
      - name: Safety mode unit
        run: python -m pytest tests/test_safety_mode.py -q --tb=short
